<!DOCTYPE html>
<html>
<head>
  <title>🚦 Smart Traffic Dashboard</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>

<body>

<div class="container">

  <div class="sidebar">
    <h2>🚦 Smart Traffic</h2>

    <label>City</label>
    <select id="citySelect"></select>

    <label>From</label>
    <select id="fromPlace"></select>

    <label>To</label>
    <select id="toPlace"></select>

    <button id="routeBtn">🚗 Find Best Route</button>

    <div id="routeInfo"></div>

    <!-- 🔥 Traffic Legend -->
    <div id="legend">
      <h4>Traffic Legend</h4>
      <div><span class="box green"></span> Low Traffic</div>
      <div><span class="box orange"></span> Moderate Traffic</div>
      <div><span class="box red"></span> Heavy Traffic</div>
      <div><span class="box blue"></span> Best Route</div>
    </div>

  </div>

  <div id="map"></div>

</div>

<script src="script.js"></script>

</body>
</html>
